<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售报告 - 至汇贸易</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { color: white; margin-bottom: 40px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .back { color: white; text-decoration: none; opacity: 0.8; margin-bottom: 20px; display: inline-block; }
        .back:hover { opacity: 1; }
        .report-list { display: flex; flex-direction: column; gap: 15px; }
        .report-card { background: white; border-radius: 12px; padding: 20px 25px; text-decoration: none; color: #333; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .report-card:hover { transform: translateX(10px); }
        .report-card h3 { color: #333; font-size: 16px; }
        .report-card .date { color: #999; font-size: 13px; }
        .report-card .arrow { color: #667eea; font-size: 20px; }
        .empty { color: white; text-align: center; padding: 40px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back">← 返回至汇贸易</a>
        <div class="header">
            <h1>📊 销售报告</h1>
        </div>
        <div class="report-list">
            <a href="2026-03-21-销售数据分析看板.html" class="report-card">
                <div>
                    <h3>销售数据分析看板</h3>
                    <span class="date">2026-03-21</span>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
