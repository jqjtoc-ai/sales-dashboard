<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="icon" type="image/png" href="../favicon.png">
    <title>金诚铭语 - 数据报告</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { color: white; margin-bottom: 40px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .back { color: white; text-decoration: none; opacity: 0.8; margin-bottom: 20px; display: inline-block; }
        .back:hover { opacity: 1; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .category-card { background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
        .category-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .category-card h2 { color: #667eea; font-size: 20px; margin-bottom: 10px; }
        .category-card p { color: #666; font-size: 14px; }
        .arrow { float: right; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back">← 返回首页</a>
        <div class="header">
            <h1>🏢 金诚铭语</h1>
        </div>
        <div class="category-grid">
            <a href="销售报告/" class="category-card">
                <h2>📊 销售报告 <span class="arrow">→</span></h2>
                <p>销售数据分析、客户排名、业务员绩效</p>
            </a>
            <a href="库存报告/" class="category-card">
                <h2>📦 库存报告 <span class="arrow">→</span></h2>
                <p>库存周转、滞销品分析，补货建议</p>
            </a>
        </div>
    </div>
</body>
</html>
