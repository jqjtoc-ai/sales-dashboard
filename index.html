<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>🐲 数据报告平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; font-size: 36px; margin-bottom: 40px; text-align: center; }
        .company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .company-card { background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
        .company-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .company-card h2 { color: #667eea; font-size: 20px; margin-bottom: 10px; }
        .company-card p { color: #666; font-size: 14px; }
        .arrow { float: right; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 数据报告平台</h1>
        <div class="company-grid">
            <a href="至汇贸易/" class="company-card">
                <h2>至汇贸易 <span class="arrow">→</span></h2>
                <p>茂名地区休闲食品经销商</p>
            </a>
            <a href="金诚铭语/" class="company-card">
                <h2>金诚铭语 <span class="arrow">→</span></h2>
                <p>休闲食品经销商</p>
            </a>
            <a href="深红果/" class="company-card">
                <h2>深红果 <span class="arrow">→</span></h2>
                <p>休闲食品经销商</p>
            </a>
        </div>
    </div>
</body>
</html>
